<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <title>Session Viewer</title>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <div class="eyebrow">Local harness archive</div>
          <h1>Session Viewer</h1>
        </div>
      </div>

      <div class="stats" id="stats">
        <div><strong>—</strong>sessions</div>
        <div><strong>—</strong>messages</div>
        <div><strong>—</strong>recorded cost</div>
      </div>
    </header>

    <section class="toolbar" aria-label="Session controls">
      <label class="field">
        <span>⌕</span>
        <span class="sr-only">Search sessions</span>
        <input
          id="search"
          type="search"
          placeholder="Search prompt, path, ID, model…"
          autocomplete="off"
        >
      </label>

      <label class="field harness-field">
        <span>Harness</span>
        <select id="harness" aria-label="Session harness"></select>
      </label>

      <label class="field sort-field">
        <span>Sort</span>
        <select id="sort">
          <option value="date">Date</option>
          <option value="path">Path</option>
          <option value="id">Session ID</option>
        </select>
      </label>

      <button
        class="icon-button"
        id="direction"
        title="Reverse sort"
        aria-label="Reverse sort"
      >↓</button>

      <button
        class="icon-button"
        id="refresh"
        title="Rescan session files"
      >Refresh</button>
    </section>

    <div class="workspace">
      <aside class="sessions">
        <div class="list-heading">
          <span>Sessions</span>
          <span id="result-count">Loading…</span>
        </div>
        <div class="session-list" id="session-list"></div>
      </aside>

      <main class="detail" id="detail">
        <div class="empty">
          <div>
            <div class="empty-symbol">◇</div>
            <p>Select a session to inspect its complete timeline.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
