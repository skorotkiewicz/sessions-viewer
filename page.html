<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Pi Session Archive</title>
<style>
:root{--bg:#090c12;--panel:#10151e;--panel2:#151c27;--line:#263142;--muted:#8b98aa;--text:#ecf2f8;--mint:#70e1bd;--amber:#ffc66d;--blue:#7db8ff;--red:#ff8d93;--shadow:0 20px 60px #0007;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#172334 0,transparent 32rem),var(--bg);color:var(--text);min-height:100vh}button,input,select{font:inherit}button{color:inherit}.shell{width:min(1600px,100%);margin:auto;padding:24px}.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:20px}.brand{display:flex;align-items:center;gap:14px}.mark{display:grid;place-items:center;width:48px;height:48px;border:1px solid #4c6a70;border-radius:15px;background:linear-gradient(145deg,#18313a,#111923);color:var(--mint);font:700 28px Georgia;box-shadow:0 10px 30px #0005}.eyebrow{text-transform:uppercase;letter-spacing:.14em;color:var(--mint);font-size:11px;font-weight:800}.brand h1{font-size:25px;margin:3px 0 0;letter-spacing:-.03em}.stats{display:flex;gap:22px;color:var(--muted);font-size:12px}.stats strong{display:block;color:var(--text);font-size:17px;margin-bottom:2px}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) auto auto auto;gap:10px;padding:12px;background:#0d121a;border:1px solid var(--line);border-radius:16px 16px 0 0}.field{display:flex;align-items:center;gap:9px;min-height:42px;padding:0 13px;background:var(--panel2);border:1px solid #2c3849;border-radius:10px;color:var(--muted)}.field:focus-within{border-color:#5c927f;box-shadow:0 0 0 3px #70e1bd15}.field input,.field select{border:0;outline:0;color:var(--text);background:transparent;width:100%}.field select{cursor:pointer}.icon-button{border:1px solid #2c3849;border-radius:10px;background:var(--panel2);padding:0 14px;cursor:pointer}.icon-button:hover{border-color:#597087;background:#1a2431}.workspace{display:grid;grid-template-columns:390px minmax(0,1fr);height:calc(100vh - 165px);min-height:560px;border:1px solid var(--line);border-top:0;border-radius:0 0 16px 16px;overflow:hidden;box-shadow:var(--shadow)}.sessions{background:#0d121a;border-right:1px solid var(--line);overflow:auto}.list-heading{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;padding:14px 16px;background:#0d121af2;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}.session-list{padding:8px}.session-card{display:block;width:100%;text-align:left;border:1px solid transparent;border-radius:12px;background:transparent;padding:13px;margin:0 0 5px;cursor:pointer}.session-card:hover{background:#141b25;border-color:#273445}.session-card.active{background:linear-gradient(110deg,#17262a,#17202b);border-color:#3b6a62;box-shadow:inset 3px 0 var(--mint)}.card-top{display:flex;justify-content:space-between;gap:12px}.card-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-date{flex:0 0 auto;color:var(--muted);font-size:11px}.preview{color:#b4becb;font-size:12px;line-height:1.45;margin:7px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.path,.session-id,.source{font:11px ui-monospace,SFMono-Regular,Consolas,monospace;color:#7f91a5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-meta,.chips,.micro{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.chip{display:inline-flex;align-items:center;max-width:100%;padding:3px 7px;border:1px solid #2b394a;border-radius:999px;background:#111823;color:#aeb9c7;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip.mint{color:var(--mint);border-color:#31594f}.chip.amber{color:var(--amber);border-color:#5b4930}.chip.blue{color:var(--blue);border-color:#324c69}.detail{overflow:auto;background:var(--panel)}.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:30px}.empty-symbol{font:60px Georgia;color:#304051}.detail-head{padding:26px 30px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#151d28,#10151e)}.detail-head h2{font-size:24px;letter-spacing:-.03em;margin:5px 0 8px;max-width:900px}.detail-path{color:#b7c4d1;font:12px ui-monospace,SFMono-Regular,Consolas,monospace;overflow-wrap:anywhere}.facts{display:grid;grid-template-columns:repeat(6,minmax(90px,1fr));gap:8px;margin-top:18px}.fact{padding:10px 11px;border:1px solid #263345;border-radius:9px;background:#111721;min-width:0}.fact span{display:block;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}.fact strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.head-extra{margin-top:13px}.timeline-head{display:flex;align-items:center;justify-content:space-between;padding:20px 30px 8px}.timeline-head h3{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#b9c4d1}.timeline{padding:0 30px 50px}.event{position:relative;margin:0 0 12px;padding:15px 17px;border:1px solid var(--line);border-radius:12px;background:#111721;overflow:hidden}.event.user{border-left:3px solid var(--blue)}.event.assistant{border-left:3px solid var(--mint)}.event.toolResult,.event.bashExecution{border-left:3px solid var(--amber);background:#12171d}.event.special{border-style:dashed;background:#0e141c}.event-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.event-role{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:800}.event-time{color:var(--muted);font-size:10px}.micro{margin:0 0 11px}.text-content,.event pre{font:12px/1.62 ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere;margin:0;color:#d8e1ea}.text-content{font-family:inherit;font-size:14px;line-height:1.65}.event details{margin-top:10px;border-top:1px solid #253142;padding-top:9px}.event summary{cursor:pointer;color:#aebdca;font-size:11px;font-weight:700}.event details[open] summary{margin-bottom:9px}.thinking summary{color:var(--mint)}.tool summary{color:var(--amber)}.tool-name{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--amber);margin-bottom:8px}.message-error{color:var(--red);margin:8px 0}.image{display:block;max-width:min(100%,800px);max-height:600px;margin-top:10px;border-radius:8px;border:1px solid var(--line)}.raw pre{max-height:430px;overflow:auto;padding:12px;border-radius:8px;background:#090d13;color:#9fb0c0}.special-title{font-weight:750;margin-bottom:6px}.special-copy{color:#c3cdd8;white-space:pre-wrap;line-height:1.55}.loading{padding:30px;color:var(--muted)}.error{color:var(--red)}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:950px){.shell{padding:12px}.workspace{grid-template-columns:330px minmax(0,1fr);height:calc(100vh - 145px)}.stats{display:none}.facts{grid-template-columns:repeat(3,1fr)}}@media(max-width:720px){.topbar{margin:4px 2px 14px}.toolbar{grid-template-columns:1fr auto auto}.toolbar .sort-field{grid-column:1/3}.workspace{display:block;height:auto;min-height:0;overflow:visible}.sessions{height:43vh;border-right:0;border-bottom:1px solid var(--line)}.detail{min-height:70vh}.detail-head,.timeline{padding-left:16px;padding-right:16px}.timeline-head{padding-left:16px;padding-right:16px}.facts{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand"><div class="mark">π</div><div><div class="eyebrow">Local archive</div><h1>Pi Sessions</h1></div></div>
    <div class="stats" id="stats"><div><strong>—</strong>sessions</div><div><strong>—</strong>messages</div><div><strong>—</strong>recorded cost</div></div>
  </header>
  <section class="toolbar" aria-label="Session controls">
    <label class="field"><span>⌕</span><span class="sr-only">Search sessions</span><input id="search" type="search" placeholder="Search prompt, path, ID, model…" autocomplete="off"></label>
    <label class="field sort-field"><span>Sort</span><select id="sort"><option value="date">Date</option><option value="path">Path</option><option value="id">Session ID</option></select></label>
    <button class="icon-button" id="direction" title="Reverse sort" aria-label="Reverse sort">↓</button>
    <button class="icon-button" id="refresh" title="Rescan session files">Refresh</button>
  </section>
  <div class="workspace">
    <aside class="sessions"><div class="list-heading"><span>Sessions</span><span id="result-count">Loading…</span></div><div class="session-list" id="session-list"></div></aside>
    <main class="detail" id="detail"><div class="empty"><div><div class="empty-symbol">π</div><p>Select a session to inspect its complete timeline.</p></div></div></main>
  </div>
</div>
<script>
'use strict';
const state={sessions:[],selected:null,sort:'date',direction:-1,query:'',request:0};
const list=document.getElementById('session-list');
const detail=document.getElementById('detail');
const count=document.getElementById('result-count');
function make(tag,className,text){const n=document.createElement(tag);if(className)n.className=className;if(text!==undefined)n.textContent=text;return n}
function add(parent,tag,className,text){const n=make(tag,className,text);parent.appendChild(n);return n}
function chip(parent,text,tone){return add(parent,'span','chip '+(tone||''),text)}
function compactPath(value){return (value||'').replace(/^\/home\/[^/]+/,'~').replace(/^\/Users\/[^/]+/,'~')}
function short(value,size){value=String(value||'');return value.length>(size||12)?value.slice(0,size||12)+'…':value}
function date(value,compact){if(!value)return 'Unknown';const d=new Date(value);if(Number.isNaN(d.valueOf()))return value;return compact?d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'2-digit'}):d.toLocaleString()}
function duration(ms){if(ms==null)return '—';const seconds=Math.floor(ms/1000);if(seconds<60)return seconds+'s';const minutes=Math.floor(seconds/60);if(minutes<60)return minutes+'m '+seconds%60+'s';return Math.floor(minutes/60)+'h '+minutes%60+'m'}
function bytes(value){if(value==null)return '—';const units=['B','KB','MB','GB'];let n=value,u=0;while(n>=1024&&u<units.length-1){n/=1024;u++}return n.toFixed(u?1:0)+' '+units[u]}
function money(value){return '$'+Number(value||0).toFixed(Number(value||0)<.01?4:2)}
function totalCost(session){return Number((session.cost||{}).total||0)}
function totalTokens(session){return Number((session.usage||{}).totalTokens||0)}
function displayTitle(session){return session.firstUserMessage||compactPath(session.cwd).split('/').pop()||'Untitled session'}
function setStats(){const messages=state.sessions.reduce((n,s)=>n+s.messageCount,0);const costValue=state.sessions.reduce((n,s)=>n+totalCost(s),0);const values=[state.sessions.length.toLocaleString(),messages.toLocaleString(),money(costValue)];document.querySelectorAll('#stats strong').forEach((node,index)=>node.textContent=values[index])}
function visibleSessions(){const query=state.query.trim().toLowerCase();const items=state.sessions.filter((session)=>!query||[session.id,session.cwd,session.firstUserMessage,(session.models||[]).join(' '),(session.thinkingModes||[]).join(' ')].join(' ').toLowerCase().includes(query));const field=state.sort;items.sort((a,b)=>{let av=field==='date'?a.timestamp:field==='path'?a.cwd:a.id;let bv=field==='date'?b.timestamp:field==='path'?b.cwd:b.id;return String(av||'').localeCompare(String(bv||''))*state.direction});return items}
function renderList(){const items=visibleSessions();count.textContent=items.length+' of '+state.sessions.length;list.replaceChildren();if(!items.length){add(list,'div','loading','No sessions match this search.');return}const fragment=document.createDocumentFragment();for(const session of items){const button=make('button','session-card'+(session.id===state.selected?' active':''));button.type='button';button.addEventListener('click',()=>selectSession(session.id));const top=add(button,'div','card-top');add(top,'div','card-title',compactPath(session.cwd).split('/').pop()||'Unknown path');add(top,'div','card-date',date(session.timestamp,true));add(button,'div','preview',session.firstUserMessage||'No user message recorded');add(button,'div','path',compactPath(session.cwd));add(button,'div','session-id',session.id);const meta=add(button,'div','card-meta');chip(meta,session.messageCount+' messages','blue');if(session.models[0])chip(meta,short(session.models[0],28),'mint');if(totalCost(session))chip(meta,money(totalCost(session)),'amber');fragment.appendChild(button)}list.appendChild(fragment)}
async function loadSessions(){list.replaceChildren(make('div','loading','Scanning ~/.pi/agent/sessions…'));count.textContent='Loading…';try{const response=await fetch('/api/sessions');if(!response.ok)throw new Error(await response.text());const data=await response.json();state.sessions=data.sessions;setStats();renderList();const wanted=location.hash.slice(1);const first=(visibleSessions()[0]||{}).id;if(wanted&&state.sessions.some((session)=>session.id===wanted))await selectSession(wanted);else if(first)await selectSession(first);else detail.replaceChildren(make('div','empty','No Pi sessions found.'))}catch(error){list.replaceChildren(make('div','loading error',error.message));count.textContent='Failed'}}
async function selectSession(id){state.selected=id;renderList();history.replaceState(null,'','#'+id);const request=++state.request;detail.replaceChildren(make('div','loading','Loading complete session…'));try{const response=await fetch('/api/session/'+encodeURIComponent(id));if(!response.ok)throw new Error(await response.text());const data=await response.json();if(request===state.request)renderDetail(data)}catch(error){if(request===state.request)detail.replaceChildren(make('div','loading error',error.message))}}
function fact(parent,label,value,title){const box=add(parent,'div','fact');add(box,'span','',label);const strong=add(box,'strong','',value);if(title)strong.title=title}
function renderDetail(data){const session=data.summary;detail.replaceChildren();const head=add(detail,'header','detail-head');add(head,'div','eyebrow','Session · '+(session.version?'schema v'+session.version:'unknown schema'));add(head,'h2','',displayTitle(session));add(head,'div','detail-path',compactPath(session.cwd));const facts=add(head,'div','facts');fact(facts,'Started',date(session.timestamp),session.timestamp);fact(facts,'Duration',duration(session.durationMs));fact(facts,'Events',session.eventCount.toLocaleString());fact(facts,'Messages',session.messageCount.toLocaleString());fact(facts,'Tokens',totalTokens(session).toLocaleString());fact(facts,'Cost',money(totalCost(session)));const extras=add(head,'div','head-extra');add(extras,'div','source',session.id);add(extras,'div','source',session.fileDate+' · '+bytes(session.size)+' · '+compactPath(session.sourceFile));const tags=add(extras,'div','chips');for(const model of session.models)chip(tags,model,'mint');for(const mode of session.thinkingModes)chip(tags,'thinking: '+mode,'blue');if(session.parentSession)chip(tags,'forked session','amber');if(session.parseErrors)chip(tags,session.parseErrors+' parse errors','amber');const timelineHead=add(detail,'div','timeline-head');add(timelineHead,'h3','', 'Complete event timeline');add(timelineHead,'div','session-id',data.events.length+' stored records');const timeline=add(detail,'section','timeline');const fragment=document.createDocumentFragment();data.events.forEach((event,index)=>fragment.appendChild(renderEvent(event,index)));timeline.appendChild(fragment)}
function eventLabel(record){if(record.type==='message')return (record.message&&record.message.role)||'message';return record.type||'unknown'}
function rawDetails(record){const box=make('details','raw');const summary=add(box,'summary','','All stored fields · raw JSON');box.addEventListener('toggle',()=>{if(box.open&&!box.dataset.loaded){add(box,'pre','',JSON.stringify(record,null,2));box.dataset.loaded='yes'}},{once:true});return box}
function renderEvent(event,index){const record=event.record||{};const context=event.context||{};const role=eventLabel(record);const article=make('article','event '+(record.type==='message'?role:'special'));const header=add(article,'div','event-header');add(header,'div','event-role',role);add(header,'div','event-time',date(record.timestamp)+' · #'+(index+1));const micro=add(article,'div','micro');chip(micro,'Model · '+([context.provider,context.model].filter(Boolean).join('/')||'not set'),'mint');chip(micro,'Thinking · '+(context.thinking||'not set'),'blue');if(record.id)chip(micro,'ID · '+short(record.id,14));if(record.parentId)chip(micro,'Parent · '+short(record.parentId,14));if(record.type==='message')renderMessage(article,record.message||{});else renderSpecial(article,record);article.appendChild(rawDetails(record));return article}
function renderMessage(parent,message){if(message.role==='toolResult'){add(parent,'div','tool-name',(message.toolName||'Tool result')+(message.isError?' · error':''));if(message.toolCallId)add(parent,'div','session-id','Call '+message.toolCallId)}if(message.role==='bashExecution'){add(parent,'div','tool-name','$ '+(message.command||''));add(parent,'pre','',message.output||'');if(message.exitCode!=null)chip(add(parent,'div','chips'),'exit '+message.exitCode,message.exitCode?'amber':'mint')}renderContent(parent,message.content);if(message.errorMessage)add(parent,'div','message-error',message.errorMessage);if(message.usage){const row=add(parent,'div','chips');if(message.usage.input!=null)chip(row,'in '+Number(message.usage.input).toLocaleString());if(message.usage.output!=null)chip(row,'out '+Number(message.usage.output).toLocaleString());if(message.usage.reasoning)chip(row,'reasoning '+Number(message.usage.reasoning).toLocaleString());if(message.usage.cacheRead)chip(row,'cache '+Number(message.usage.cacheRead).toLocaleString());if(message.usage.cost&&message.usage.cost.total!=null)chip(row,money(message.usage.cost.total),'amber');if(message.stopReason)chip(row,'stop · '+message.stopReason)} }
function renderContent(parent,content){if(typeof content==='string'){add(parent,'div','text-content',content);return}if(!Array.isArray(content))return;for(const item of content){if(!item||typeof item!=='object'){add(parent,'pre','',String(item));continue}if(item.type==='text'){add(parent,'div','text-content',item.text||'')}else if(item.type==='thinking'){const box=add(parent,'details','thinking');add(box,'summary','','Thinking');add(box,'div','text-content',item.thinking||'')}else if(item.type==='toolCall'){const box=add(parent,'details','tool');add(box,'summary','','Tool call · '+(item.name||'unknown'));add(box,'div','tool-name',item.id||'');add(box,'pre','',typeof item.arguments==='string'?item.arguments:JSON.stringify(item.arguments,null,2))}else if(item.type==='image'){const safe=['image/png','image/jpeg','image/gif','image/webp'].includes(item.mimeType);if(safe&&item.data){const image=add(parent,'img','image');image.alt='Session image';image.loading='lazy';image.src='data:'+item.mimeType+';base64,'+item.data}else add(parent,'div','text-content','Image · '+(item.mimeType||'unknown format'))}else add(parent,'pre','',JSON.stringify(item,null,2))}}
function renderSpecial(parent,record){let title=record.type||'Event';let copy='';if(record.type==='session'){title='Session started';copy=record.cwd||''}else if(record.type==='model_change'){title='Model changed';copy=[record.provider,record.modelId].filter(Boolean).join('/')}else if(record.type==='thinking_level_change'){title='Thinking mode changed';copy=record.thinkingLevel||''}else if(record.type==='compaction'){title='Context compacted';copy=record.summary||''}else if(record.type==='custom'){title='Custom event · '+(record.customType||'unknown');copy=JSON.stringify(record.data,null,2)}else if(record.type==='custom_message'){title='Custom message · '+(record.customType||'unknown');copy=typeof record.content==='string'?record.content:JSON.stringify(record.content,null,2)}add(parent,'div','special-title',title);if(copy)add(parent,'div','special-copy',copy)}
document.getElementById('search').addEventListener('input',(event)=>{state.query=event.target.value;renderList()});document.getElementById('sort').addEventListener('change',(event)=>{state.sort=event.target.value;renderList()});document.getElementById('direction').addEventListener('click',(event)=>{state.direction*=-1;event.currentTarget.textContent=state.direction===-1?'↓':'↑';renderList()});document.getElementById('refresh').addEventListener('click',loadSessions);window.addEventListener('hashchange',()=>{const id=location.hash.slice(1);if(id&&id!==state.selected)selectSession(id)});loadSessions();
</script>
</body>
</html>
